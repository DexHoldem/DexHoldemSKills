# DexHoldem Native — Configuration
# Native agent vision + reasoning pipeline (no external API calls)

# Local webcam capture
capture:
  command: "python3 src/capture.py --device 0"
  output_path: /tmp/poker_latest.jpg

# Robot policy execution
robot:
  translator_command: "python3 src/action_translator.py --action {action_json}"
  command_template: "{command}"  # translator outputs the full command

# Remote terminal (HTTP requests to PyAutoGUI service on remote machine)
remote_terminal:
  host: "http://192.168.1.201:5000"  # URL of the PyAutoGUI service on the remote machine
  click_x: 804                    # x screen coordinate of terminal window (on remote machine)
  click_y: 641                    # y screen coordinate of terminal window (on remote machine)
  focus_delay: 0.3                # seconds to wait after click for focus (sent to remote)
  ctrlc_delay: 0.5                # seconds to wait after Ctrl+C before next action
  max_retries: 3                  # max times to retry a failed command
  retry_delay: 1.0                # seconds to wait before retrying

# Reset the dexterous hand to init state (click the GUI reset button on the remote screen)
reset_hand:
  click_x: 2587
  click_y: 1094

# Termination detection (frame diff stability)
termination:
  check_interval: 30              # seconds between frame captures during detection (robot moves slowly)
  stability_threshold: 0.03       # pixel diff below this = scene is stable
  timeout: 120                    # seconds before giving up on action completion

# Experiment directory (state + frames + logs saved per session)
experiments:
  base_dir: ./experiments           # experiment folders created here

# Game loop settings
loop:
  poll_interval: 30               # seconds between captures (robot moves slowly)
  max_rounds: 0                   # 0 = unlimited
