# DexHoldem — Dry Run Configuration
# Same structure as config.yaml but points to the local dry-run server.

capture:
  command: "python3 src/capture.py --device 0"
  output_path: /tmp/poker_latest.jpg

robot:
  translator_command: "python3 src/action_translator.py --action {action_json}"
  command_template: "{command}"

remote_terminal:
  host: "http://127.0.0.1:18271"
  click_x: 804
  click_y: 641
  focus_delay: 0.3
  ctrlc_delay: 0.5
  max_retries: 3
  retry_delay: 1.0

put_down_card:
  click_x: 2587
  click_y: 1094

termination:
  check_interval: 1
  stability_threshold: 0.03
  timeout: 10

experiments:
  base_dir: ./experiments

loop:
  poll_interval: 0
  max_rounds: 100
