# Texas Hold'em Robot — Configuration
# Three-model pipeline: vision (image → game state) + decision (game state → action) + termination (action confirmation)

# Vision Model — extracts game state from poker table image
vision:
  provider: openrouter              # openrouter | openai | anthropic
  model: google/gemini-3-flash-preview             # must support vision/image input
  temperature: 0.1                  # near-deterministic extraction
  max_tokens: 512
  top_p: 1.0

# Decision Model — produces poker action from game state
decision:
  provider: openrouter              # openrouter | openai | anthropic
  model: openai/gpt-5.4            # model identifier (provider-specific)
  temperature: 0.3
  max_tokens: 512
  top_p: 1.0

# Local webcam capture
capture:
  command: "python3 capture.py --device 0"
  output_path: /tmp/poker_latest.jpg

# Robot policy execution
robot:
  translator_command: "python3 action_translator.py --action {action_json}"
  command_template: "python policy.py --action '{command}'"  # what gets typed into remote terminal

# Remote terminal (HTTP requests to PyAutoGUI service on remote machine)
remote_terminal:
  host: "http://192.168.1.50:5000"  # URL of the PyAutoGUI service on the remote machine
  click_x: 500                    # x screen coordinate of terminal window (on remote machine)
  click_y: 300                    # y screen coordinate of terminal window (on remote machine)
  focus_delay: 0.3                # seconds to wait after click for focus (sent to remote)
  ctrlc_delay: 0.5                # seconds to wait after Ctrl+C before next action
  max_retries: 3                  # max times to retry a failed command
  retry_delay: 1.0                # seconds to wait before retrying

# Termination detection
termination:
  check_interval: 1                 # seconds between frame captures during detection
  history_size: 5                   # number of frames to keep in rolling buffer
  stability_threshold: 0.03        # pixel diff below this = scene is stable
  timeout: 30                      # seconds before force-killing policy process
  max_not_done_retries: 3          # vision "not done" retries on stable scene before force-kill

# Game loop settings
loop:
  poll_interval: 2                 # seconds between captures
  max_rounds: 0                    # 0 = unlimited

# Game state logging
logging:
  game_state_log: /tmp/poker_session_log.jsonl

# Shared API key (override per-model with vision.api_key_env / decision.api_key_env)
api_key_env: OPENROUTER_API_KEY
